<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unionism Network — People</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">People (from unionism.db)</div>
      <div class="controls">
        <div class="muted" id="count">Loading…</div>
      </div>
    </header>

    <main class="layout" style="grid-template-columns: 1fr 380px;">
      <section class="panel">
        <div class="panelHeader">People nodes</div>
        <svg id="viz" class="network" role="img" aria-label="People visualization"></svg>
      </section>

      <section class="panel details">
        <div class="panelHeader">Details</div>
        <div id="details" class="detailsBody">
          <div class="muted">Click a node.</div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="/static/people.js"></script>
  </body>
</html>
