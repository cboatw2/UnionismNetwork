<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unionism Network</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/styles.css?v=9" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">Unionism Network (MVP)</div>
      <nav class="topNav">
        <a href="/" class="navLink active">Network</a>
        <a href="/people" class="navLink">People</a>
        <a href="/events" class="navLink">Events</a>
        <a href="/places" class="navLink">Places</a>
        <a href="/organizations" class="navLink">Organizations</a>
        <a href="/sources" class="navLink">Sources</a>
        <a href="/entry" class="navLink">Legacy entry</a>
      </nav>
      <div class="controls">
        <a href="/entry" class="panelBtn" style="text-decoration:none;">+ Add data</a>
        <label>
          Year
          <input id="year" type="range" min="1779" max="1865" step="1" value="1832" />
          <input id="yearInput" type="number" min="1779" max="1865" step="1" value="1832" class="yearNumber" />
        </label>
        <label class="checkboxRow" title="Show every relationship/residence/membership regardless of date">
          <input id="allYears" type="checkbox" />
          All years
        </label>
        <label>
          Issue
          <select id="issue"></select>
        </label>
        <label>
          Scale
          <select id="scale">
            <option value="">(any)</option>
          </select>
        </label>
        <label>
          Search
          <input id="search" type="search" placeholder="name…" autocomplete="off" />
        </label>
        <label class="checkboxRow">
          <input id="filterCoded" type="checkbox" />
          Coded people only
        </label>
        <label class="checkboxRow">
          <input id="filterHideCoMentions" type="checkbox" />
          Hide co-mentions
        </label>
        <label class="checkboxRow">
          <input id="filterFocus" type="checkbox" checked />
          Focus on selected
        </label>
        <label class="checkboxRow">
          <input id="showLabels" type="checkbox" />
          Show all labels
        </label>
        <span class="layerGroup" title="Which connection layers to render">
          <span class="layerGroupLabel">Layers:</span>
          <label class="checkboxRow"><input id="layerRelationship" type="checkbox" checked /> Relationships</label>
          <label class="checkboxRow"><input id="layerCoResidence" type="checkbox" /> Co-residence</label>
          <label class="checkboxRow"><input id="layerSharedMembership" type="checkbox" checked /> Shared membership</label>
        </span>
      </div>
    </header>

    <div class="timelineBar">
      <div class="timelineControls">
        <button type="button" id="playBtn" class="playBtn" title="Play/pause timeline">▶</button>
        <label class="checkboxRow">
          Speed
          <select id="playSpeed" class="speedSelect">
            <option value="800">slow</option>
            <option value="400" selected>normal</option>
            <option value="180">fast</option>
          </select>
        </label>
        <label class="checkboxRow">
          <input id="playLoop" type="checkbox" checked />
          Loop
        </label>
        <label class="checkboxRow" title="Pull supports/opposes apart by issue stance">
          <input id="filterClusterByStance" type="checkbox" checked />
          Cluster by stance
        </label>
        <span class="yearDisplay" id="yearDisplay">1832</span>
      </div>
      <div class="chapterChips" id="chapterChips">
        <button type="button" class="chapterChip" data-year="1828" data-issue="nullification">1828 · Exposition</button>
        <button type="button" class="chapterChip" data-year="1830" data-issue="nullification">1830 · Webster–Hayne</button>
        <button type="button" class="chapterChip" data-year="1832" data-issue="nullification">1832 · Ordinance</button>
        <button type="button" class="chapterChip" data-year="1833" data-issue="nullification">1833 · Compromise</button>
        <button type="button" class="chapterChip" data-year="1835" data-issue="slavery">1835 · Slavery hardens</button>
        <button type="button" class="chapterChip" data-year="1850" data-issue="federal_power">1850 · Compromise</button>
        <button type="button" class="chapterChip" data-year="1860" data-issue="secession">1860 · Secession</button>
        <button type="button" class="chapterChip" data-year="1863" data-issue="secession">1863 · Petigru dies</button>
      </div>
    </div>

    <main class="layout">
      <section class="panel">
        <div class="panelHeader">Map</div>
        <div id="map" class="map"></div>
      </section>

      <section class="panel" id="networkPanel">
        <div class="panelHeader">
          <span>Network</span>
          <span class="panelActions">
            <button type="button" id="networkFit" class="panelBtn" title="Fit network to view">Fit</button>
            <button type="button" id="networkExpand" class="panelBtn" title="Expand network to fullscreen">Expand</button>
          </span>
        </div>
        <svg id="network" class="network" role="img" aria-label="Unionism network"></svg>
      </section>

      <section class="panel details">
        <div class="panelHeader">Details</div>
        <div id="details" class="detailsBody">
          <div class="muted">Click a person or edge.</div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="/static/app.js?v=13"></script>
  </body>
</html>
